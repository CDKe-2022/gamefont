<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高铁路线海报生成器 - 地图极致优化版</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 20px; background-color: #f5f7fa; display: flex; height: 100vh; box-sizing: border-box; }
        .panel { width: 340px; padding: 20px; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-right: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .panel h2 { font-size: 18px; margin-top: 0; border-bottom: 1px solid #f0f0f0; padding-bottom: 12px; color: #1f1f1f; display: flex; align-items: center; gap: 6px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1.5px solid #e1e4e8; border-radius: 6px; box-sizing: border-box; font-size: 13px; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #1890ff; }
        .btn { width: 100%; padding: 12px; background: #1890ff; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; margin-bottom: 10px; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn-export { background: #52c41a; }
        .preview-area { flex: 1; background: #eaedf1; border-radius: 12px; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        svg { background: #fff; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .color-row { display: flex; justify-content: space-between; gap: 10px; }
        .color-row > div { flex: 1; }
        .error { color: #f5222d; font-size: 12px; margin-top: 5px; padding: 8px; background: #fff1f0; border-radius: 4px; border: 1px solid #ffccc7; display: none; }
        .warning { color: #fa8c16; font-size: 12px; margin-top: 5px; padding: 8px; background: #fffbe6; border-radius: 4px; border: 1px solid #ffe58f; display: none; }
        .tips { font-size: 11px; color: #8c8c8c; line-height: 1.5; margin-top: auto; padding-top: 15px; border-top: 1px dashed #e8e8e8; }
    </style>
</head>
<body>

    <!-- 左侧控制面板 -->
    <div class="panel">
        <h2>🚄 高铁路线海报生成器</h2>
        
        <div class="form-group">
            <label>地图区域</label>
            <select id="mapRegion" onchange="loadMapDataAndRender()">
                <option value="四川">四川省</option>
                <option value="广东">广东省</option>
                <option value="浙江">浙江省</option>
                <option value="江苏">江苏省</option>
                <option value="山东">山东省</option>
                <option value="全国">中国全图</option>
            </select>
        </div>

        <div class="form-group">
            <label>起点站 (支持输入"站名(经度,纬度)")</label>
            <input type="text" id="startStation" value="自贡站">
        </div>
        <div class="form-group">
            <label>终点站 (内置数百个站点)</label>
            <input type="text" id="endStation" value="成都东站">
        </div>
        
        <div class="form-group">
            <label>车次信息</label>
            <input type="text" id="trainNo" value="G8770 复兴号">
        </div>
        <div class="form-group">
            <label>时间/耗时</label>
            <input type="text" id="trainTime" value="08:15 - 09:56 (1h41m)">
        </div>

        <div class="color-row">
            <div class="form-group">
                <label>普通地图底色</label>
                <input type="color" id="baseColor" value="#f5f5f5">
            </div>
            <div class="form-group">
                <label>起止城市高亮色</label>
                <input type="color" id="highlightColor" value="#ff4d4f">
            </div>
        </div>

        <div class="color-row">
            <div class="form-group">
                <label>路线/文字颜色</label>
                <input type="color" id="routeColor" value="#1a1a1a">
            </div>
            <div class="form-group">
                <label>城市边界描边</label>
                <input type="color" id="borderColor" value="#dddddd">
            </div>
        </div>

        <button class="btn btn-export" onclick="downloadSVG()">💾 导出 SVG (用于设计/幻灯片)</button>
        
        <div id="warnMessage" class="warning"></div>
        <div id="errorMessage" class="error"></div>

        <div class="tips">
            <strong>💡 高级技巧：</strong><br>
            如果输入的站点在字典中未找到，可直接按格式输入坐标临时绘制。例如：<br>
            <code style="background:#f5f5f5;padding:2px 4px;border-radius:3px">达州站 (107.472, 31.218)</code>
        </div>
    </div>

    <!-- 右侧预览区 -->
    <div class="preview-area">
        <svg id="mapSvg" width="500" height="700"></svg>
    </div>

    <script>
        // --- 内置常用高铁站点地理坐标库 (GCJ-02/WGS84 混用在地图比例尺下无感) ---
        const STATION_DB = {
            // 四川及重庆
            "自贡站": [104.771, 29.381], "成都东站": [104.144, 30.631], "成都南站": [104.068, 30.606], "成都西站": [103.975, 30.676],
            "绵阳站": [104.726, 31.468], "德阳站": [104.412, 31.141], "乐山站": [103.715, 29.605], "峨眉山站": [103.491, 29.589],
            "宜宾站": [104.607, 28.752], "宜宾西站": [104.577, 28.734], "泸州站": [105.433, 28.919], "广安南站": [106.634, 30.443],
            "南充站": [106.082, 30.811], "达州站": [107.472, 31.218], "广元站": [105.815, 32.435], "遂宁站": [105.568, 30.528],
            "内江北站": [105.045, 29.611], "简阳南站": [104.562, 30.384], "资阳北站": [104.629, 30.151], "眉山东站": [103.829, 30.048],
            "雅安站": [103.041, 29.988], "西昌西站": [102.193, 27.881], "攀枝花南站": [101.716, 26.495],
            "重庆北站": [106.608, 29.615], "重庆西站": [106.443, 29.485], "沙坪坝站": [106.469, 29.556],
            // 广东
            "广州南站": [113.267, 22.988], "深圳北站": [114.029, 22.609], "珠海站": [113.557, 22.221], "汕头站": [116.749, 23.365],
            "潮汕站": [116.608, 23.551], "湛江西站": [110.301, 21.155], "韶关站": [113.513, 24.789],
            // 浙江
            "杭州东站": [120.213, 30.290], "宁波站": [121.536, 29.866], "温州南站": [120.584, 27.967], "金华站": [119.642, 29.117],
            // 江苏
            "南京南站": [118.797, 31.963], "苏州站": [120.612, 31.330], "无锡站": [120.303, 31.589], "徐州东站": [117.291, 34.263],
            // 山东
            "济南西站": [116.892, 36.668], "青岛站": [120.318, 36.065], "烟台站": [121.383, 37.548], "临沂北站": [118.358, 35.197],
            // 全国大站
            "北京西站": [116.322, 39.894], "北京南站": [116.379, 39.865], "上海虹桥站": [121.320, 31.194], "武汉站": [114.424, 30.607],
            "长沙南站": [113.064, 28.148], "西安北站": [108.939, 34.375], "郑州东站": [113.778, 34.758], "昆明南站": [102.852, 24.880],
            "贵阳北站": [106.671, 26.621], "兰州西站": [103.749, 36.068], "南宁东站": [108.409, 22.827]
        };

        const MAP_URLS = {
            "四川": "https://geo.datav.aliyun.com/areas_v3/bound/510000_full.json",
            "广东": "https://geo.datav.aliyun.com/areas_v3/bound/440000_full.json",
            "浙江": "https://geo.datav.aliyun.com/areas_v3/bound/330000_full.json",
            "江苏": "https://geo.datav.aliyun.com/areas_v3/bound/320000_full.json",
            "山东": "https://geo.datav.aliyun.com/areas_v3/bound/370000_full.json",
            "全国": "https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json"
        };

        let currentRegion = "";
        let geoJsonCache = {};

        // --- 坐标输入解析器 ---
        function parseStation(inputVal, defaultCoord) {
            const trimmed = inputVal.trim();
            
            // 尝试匹配带括号的坐标输入，例: 自贡站 (104.77, 29.38)
            const coordRegex = /[\(\uff08]\s*([\d\.]+)\s*[\s,，]\s*([\d\.]+)\s*[\)\uff09]/;
            const match = trimmed.match(coordRegex);
            
            if (match) {
                const name = trimmed.replace(/[\(\uff08].*[\)\uff09]/, "").trim();
                return { name, coords: [parseFloat(match[1]), parseFloat(match[2])], custom: true };
            }

            // 在静态库中匹配
            if (STATION_DB[trimmed]) {
                return { name: trimmed, coords: STATION_DB[trimmed], custom: false };
            }

            // 完全匹配不到，给出降级方案
            return { 
                name: trimmed, 
                coords: defaultCoord, 
                notFound: true 
            };
        }

        // --- 提取城市纯文字用于匹配高亮 ---
        function getCityKey(stationName) {
            return stationName.replace(/(站|东|西|南|北|机场)/g, "");
        }

        // --- 加载数据并渲染 ---
        async function loadMapDataAndRender() {
            const regionSelect = document.getElementById("mapRegion").value;
            const errorDiv = document.getElementById("errorMessage");
            const warnDiv = document.getElementById("warnMessage");
            
            errorDiv.style.display = "none";
            warnDiv.style.display = "none";

            try {
                if (!geoJsonCache[regionSelect]) {
                    const response = await fetch(MAP_URLS[regionSelect]);
                    if (!response.ok) throw new Error(`无法获取该区域地图数据`);
                    geoJsonCache[regionSelect] = await response.json();
                }
                currentRegion = regionSelect;
                renderMap(geoJsonCache[regionSelect]);
            } catch (err) {
                errorDiv.textContent = `加载地图失败: ${err.message}`;
                errorDiv.style.display = "block";
            }
        }

        // --- 主渲染程序 ---
        function renderMap(geoData) {
            const svg = d3.select("#mapSvg");
            svg.selectAll("*").remove();

            // 1. 获取和解析输入参数
            const startInput = document.getElementById("startStation").value;
            const endInput = document.getElementById("endStation").value;
            const trainNo = document.getElementById("trainNo").value;
            const trainTime = document.getElementById("trainTime").value;
            
            const baseColor = document.getElementById("baseColor").value;
            const highlightColor = document.getElementById("highlightColor").value;
            const routeColor = document.getElementById("routeColor").value;
            const borderColor = document.getElementById("borderColor").value;

            // 智能容错：当匹配失败时的坐标默认值 (自贡 vs 成都东)
            const startParsed = parseStation(startInput, [104.771, 29.381]);
            const endParsed = parseStation(endInput, [104.144, 30.631]);

            // 显示警告提示
            const warnDiv = document.getElementById("warnMessage");
            let warnings = [];
            if (startParsed.notFound) warnings.push(`未找到 [${startParsed.name}] 坐标，已使用自贡站做临时占位。`);
            if (endParsed.notFound) warnings.push(`未找到 [${endParsed.name}] 坐标，已使用成都东站做临时占位。`);
            if (warnings.length > 0) {
                warnDiv.innerHTML = warnings.join("<br>");
                warnDiv.style.display = "block";
            }

            const p1 = startParsed.coords;
            const p2 = endParsed.coords;

            // 提取起终点核心地名 (比如 "成都东" -> "成都"，用于匹配地图 properties.name)
            const startCity = getCityKey(startParsed.name);
            const endCity = getCityKey(endParsed.name);

            // 2. 核心数学：重构投影自适应定位 (fitExtent)
            const width = 500, height = 700;

            // 构造包含“地图多边形”和“起止点坐标”的临时复合虚拟 Feature，一键计算完美可视范围
            const virtualFeatures = [
                ...geoData.features,
                { type: "Feature", geometry: { type: "Point", coordinates: p1 } },
                { type: "Feature", geometry: { type: "Point", coordinates: p2 } }
            ];
            const fitCollection = { type: "FeatureCollection", features: virtualFeatures };

            // 投影设置：地图自适应缩放（预留顶部标题 70px 空间，底部卡片 140px 空间）
            const projection = d3.geoMercator()
                .fitExtent([[35, 80], [width - 35, height - 160]], fitCollection);
            
            const pathGenerator = d3.geoPath().projection(projection);

            // 3. 渲染精致海报框与背景
            svg.append("rect")
                .attr("width", width)
                .attr("height", height)
                .attr("fill", "#ffffff");

            // 绘制海报艺术边框
            svg.append("rect")
                .attr("x", 15)
                .attr("y", 15)
                .attr("width", width - 30)
                .attr("height", height - 30)
                .attr("fill", "none")
                .attr("stroke", "#1a1a1a")
                .attr("stroke-width", 1)
                .attr("opacity", 0.15);

            // 顶端复古打字机风小字
            svg.append("text")
                .attr("x", width / 2)
                .attr("y", 45)
                .attr("text-anchor", "middle")
                .attr("font-size", "10px")
                .attr("letter-spacing", "3px")
                .attr("font-weight", "600")
                .attr("fill", "#8c8c8c")
                .text("CHINA HIGH-SPEED RAILWAY poster");

            // 4. 渲染地图板块 (包含高亮检测)
            svg.append("g")
                .attr("class", "map-layer")
                .selectAll("path")
                .data(geoData.features)
                .enter()
                .append("path")
                .attr("d", pathGenerator)
                .attr("fill", d => {
                    const name = d.properties.name || "";
                    // 模糊匹配行政区，如 "成都市" 匹配 "成都"
                    if ((startCity && name.includes(startCity)) || (endCity && name.includes(endCity))) {
                        return highlightColor;
                    }
                    return baseColor;
                })
                .attr("stroke", borderColor)
                .attr("stroke-width", 0.5);

            // 5. 投影坐标，渲染铁路线及站点
            const [x1, y1] = projection(p1);
            const [x2, y2] = projection(p2);

            // 绘制完美的路线曲线 (贝塞尔曲率优化)
            const midX = (x1 + x2) / 2;
            const midY = (y1 + y2) / 2;
            const dx = x2 - x1;
            const dy = y2 - y1;
            const offset = Math.sqrt(dx * dx + dy * dy) * 0.18; // 曲线弧度振幅
            const cx = midX - dy * (offset / Math.sqrt(dx*dx + dy*dy));
            const cy = midY + dx * (offset / Math.sqrt(dx*dx + dy*dy));

            const curvePath = `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`;

            // 路线虚线投影发光底层
            svg.append("path")
                .attr("d", curvePath)
                .attr("fill", "none")
                .attr("stroke", highlightColor)
                .attr("stroke-width", 5)
                .attr("opacity", 0.15)
                .attr("stroke-linecap", "round");

            // 路线主虚线
            svg.append("path")
                .attr("d", curvePath)
                .attr("fill", "none")
                .attr("stroke", routeColor)
                .attr("stroke-width", 2)
                .attr("stroke-dasharray", "6 4")
                .attr("stroke-linecap", "round");

            // 起始/终点站定位 Pin (立体的双层呼吸圆圈)
            function drawPin(x, y, labelText) {
                const group = svg.append("g").attr("transform", `translate(${x}, ${y})`);
                
                group.append("circle")
                    .attr("r", 9)
                    .attr("fill", highlightColor)
                    .attr("opacity", 0.25);

                group.append("circle")
                    .attr("r", 4.5)
                    .attr("fill", "#fff")
                    .attr("stroke", routeColor)
                    .attr("stroke-width", 2);

                svg.append("text")
                    .attr("x", x)
                    .attr("y", y - 14)
                    .attr("text-anchor", "middle")
                    .attr("font-size", "12px")
                    .attr("font-weight", "bold")
                    .attr("fill", routeColor)
                    .text(labelText);
            }

            drawPin(x1, y1, startParsed.name);
            drawPin(x2, y2, endParsed.name);

            // 6. 极致排版：底端精装车票信息卡片
            const cardY = height - 130;
            const cardHeight = 85;
            const cardWidth = width - 80;
            const cardX = 40;

            // 乘车证容器阴影底层
            svg.append("rect")
                .attr("x", cardX)
                .attr("y", cardY)
                .attr("width", cardWidth)
                .attr("height", cardHeight)
                .attr("fill", "#ffffff")
                .attr("rx", 8)
                .attr("filter", "drop-shadow(0px 6px 16px rgba(0,0,0,0.06))");

            // 左侧标志色竖条
            svg.append("line")
                .attr("x1", cardX + 18)
                .attr("y1", cardY + 20)
                .attr("x2", cardX + 18)
                .attr("y2", cardY + cardHeight - 20)
                .attr("stroke", highlightColor)
                .attr("stroke-width", 3.5)
                .attr("stroke-linecap", "round");

            // 卡片内容文字
            svg.append("text")
                .attr("x", cardX + 32)
                .attr("y", cardY + 34)
                .attr("font-size", "18px")
                .attr("font-weight", "800")
                .attr("fill", routeColor)
                .text(`${startParsed.name} ⇄ ${endParsed.name}`);

            svg.append("text")
                .attr("x", cardX + 32)
                .attr("y", cardY + 56)
                .attr("font-size", "11px")
                .attr("fill", "#666666")
                .attr("font-weight", "600")
                .attr("letter-spacing", "0.5px")
                .text(`DEPARTURE • ${trainNo}`);

            svg.append("text")
                .attr("x", cardX + 32)
                .attr("y", cardY + 71)
                .attr("font-size", "11px")
                .attr("fill", "#8c8c8c")
                .text(`TRAVEL TIME • ${trainTime}`);

            // 右下角“乘车检票纪念章”
            const stampGroup = svg.append("g")
                .attr("transform", `translate(${cardX + cardWidth - 55}, ${cardY + 22})`);

            stampGroup.append("rect")
                .attr("width", 35)
                .attr("height", 35)
                .attr("fill", "none")
                .attr("stroke", highlightColor)
                .attr("stroke-width", 1.2)
                .attr("opacity", 0.6)
                .attr("rx", 3);

            stampGroup.append("text")
                .attr("x", 17.5)
                .attr("y", 18)
                .attr("text-anchor", "middle")
                .attr("font-size", "8px")
                .attr("fill", highlightColor)
                .attr("font-weight", "bold")
                .text("BOARD");

            stampGroup.append("text")
                .attr("x", 17.5)
                .attr("y", 27)
                .attr("text-anchor", "middle")
                .attr("font-size", "7px")
                .attr("fill", highlightColor)
                .attr("font-weight", "500")
                .text("PASS");
        }

        // --- 导出 SVG 函数 ---
        function downloadSVG() {
            const svgEl = document.getElementById("mapSvg");
            const svgData = new XMLSerializer().serializeToString(svgEl);
            const blob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"});
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement("a");
            const startVal = document.getElementById("startStation").value.split("(")[0].trim();
            const endVal = document.getElementById("endStation").value.split("(")[0].trim();
            
            a.href = url;
            a.download = `高铁路线海报_${startVal}_${endVal}.svg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // --- 自动化响应：绑定所有控制元素实现即时预览 ---
        const inputs = ["startStation", "endStation", "trainNo", "trainTime", "baseColor", "highlightColor", "routeColor", "borderColor"];
        inputs.forEach(id => {
            document.getElementById(id).addEventListener("input", () => {
                if (currentRegion) renderMap(geoJsonCache[currentRegion]);
            });
        });

        // 页面初始化默认加载四川地图数据
        window.onload = loadMapDataAndRender;
    </script>
</body>
</html>
