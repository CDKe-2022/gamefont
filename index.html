<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>三国字兵：架构重构版 v2.0</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Microsoft YaHei', sans-serif; background: #1a252f; color: #ecf0f1; height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }
    #top-bar { background: #2c3e50; padding: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; flex-wrap: wrap; border-bottom: 1px solid #34495e; }
    .stat-box { background: #1a252f; padding: 4px 8px; border-radius: 4px; margin: 2px; }
    .stat-box span { color: #f39c12; font-weight: bold; }
    #info-ticker { width: 100%; background: #111; color: #aaa; padding: 4px; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #map-container { flex-grow: 1; position: relative; background: #2c3e50; overflow: hidden; }
    .grid-cell { position: absolute; width: 14%; height: 14%; border: 1px dashed #4a6278; border-radius: 4px; transform: translate(-50%, -50%); z-index: 1; }
    .path-cell { background: #7f8c8d; z-index: 0; position: absolute; transform: translate(-50%, -50%); }
    .unit { position: absolute; width: 14%; height: 14%; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 4px; transform: translate(-50%, -50%); z-index: 10; transition: transform 0.1s; font-size: 14px; }
    .unit-enemy { color: #e74c3c; background: rgba(231, 76, 60, 0.2); border: 1px solid #c0392b; }
    .unit-basic { color: #3498db; background: rgba(52, 152, 219, 0.2); border: 1px solid #2980b9; }
    .unit-surname { color: #9b59b6; background: rgba(155, 89, 182, 0.2); border: 1px solid #8e44ad; }
    .unit-name { color: #1abc9c; background: rgba(26, 188, 156, 0.2); border: 1px solid #16a085; }
    .unit-hero { color: #f1c40f; background: rgba(241, 196, 15, 0.3); border: 2px solid #f39c12; box-shadow: 0 0 5px #f39c12; }
    .unit-shovel { color: #95a5a6; background: rgba(149, 165, 166, 0.2); border: 1px solid #7f8c8d; }
    .selected { box-shadow: 0 0 0 3px #f1c40f; z-index: 20; transform: translate(-50%, -50%) scale(1.1); }
    .hp-bar { position: absolute; top: 2px; left: 15%; width: 70%; height: 3px; background: #c0392b; border-radius: 2px; }
    .hp-fill { height: 100%; background: #2ecc71; border-radius: 2px; }
    .stunned { animation: shake 0.5s infinite; }
    #bottom-bar { background: #2c3e50; padding: 8px; display: flex; flex-direction: column; gap: 8px; }
    #recruit-area { display: flex; gap: 6px; justify-content: space-between; }
    .slot { flex: 1; aspect-ratio: 1; background: #1a252f; border: 2px dashed #4a6278; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; position: relative; }
    .slot.empty { border-color: #2c3e50; }
    #action-area { display: flex; gap: 10px; }
    button { color: white; border: none; border-radius: 4px; font-size: 14px; font-weight: bold; }
    #recruit-btn { flex: 3; padding: 12px; background: #e67e22; }
    #recruit-btn:active { background: #d35400; }
    #recruit-btn:disabled { background: #95a5a6; }
    #next-wave-btn { flex: 2; padding: 12px; background: #c0392b; }
    #next-wave-btn:active { background: #e74c3c; }
    #open-map-btn { flex: 1; padding: 12px; background: #27ae60; }
    #open-map-btn:disabled { background: #95a5a6; }
    #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    #game-over h1 { color: #e74c3c; font-size: 32px; margin-bottom: 10px; }
    @keyframes shake { 0% { transform: translate(-50%, -50%) translateX(0); } 25% { transform: translate(-50%, -50%) translateX(-3px); } 75% { transform: translate(-50%, -50%) translateX(3px); } 100% { transform: translate(-50%, -50%) translateX(0); } }
</style>
</head>
<body>

<div id="top-bar">
    <div style="display:flex; flex-wrap:wrap; width:100%;">
        <div class="stat-box">血: <span id="castle-hp">100</span></div>
        <div class="stat-box">金: <span id="gold">50</span></div>
        <div class="stat-box">波: <span id="wave-num">0</span></div>
        <div class="stat-box">铲: <span id="shovel-count">0</span>/3</div>
    </div>
    <div id="info-ticker">架构重构版 v2.0。点击招募，开始布阵。</div>
</div>

<div id="map-container">
    <div id="game-over">
        <h1>城破国亡！</h1>
        <p id="survival-time"></p>
        <button id="restart-btn" style="padding: 10px 20px; background: #e67e22;">重新开始</button>
    </div>
</div>

<div id="bottom-bar">
    <div id="recruit-area"></div>
    <div id="action-area">
        <button id="recruit-btn">招募 (20金)</button>
        <button id="next-wave-btn">出阵迎敌</button>
        <button id="open-map-btn" disabled>开图</button>
    </div>
</div>

<script>
// ================= 1. 核心基础架构 =================

// 事件总线：解耦系统间通信
const EventBus = {
    events: {},
    on(event, callback) { (this.events[event] = this.events[event] || []).push(callback); },
    emit(event, data) { (this.events[event] || []).forEach(cb => cb(data)); }
};

// 空间网格系统：优化索敌性能 O(n²) -> O(n)
class SpatialGrid {
    constructor(cellSize = 20) { this.cellSize = cellSize; this.grid = new Map(); }
    clear() { this.grid.clear(); }
    _getKey(x, y) { return `${Math.floor(x / this.cellSize)},${Math.floor(y / this.cellSize)}`; }
    insert(entity) {
        const key = this._getKey(entity.x, entity.y);
        if (!this.grid.has(key)) this.grid.set(key, []);
        this.grid.get(key).push(entity);
    }
    // 查找某点周围 3x3 范围内的实体
    queryNearby(x, y, range) {
        const results = [];
        const checks = Math.ceil(range / this.cellSize);
        const baseX = Math.floor(x / this.cellSize);
        const baseY = Math.floor(y / this.cellSize);
        for (let i = -checks; i <= checks; i++) {
            for (let j = -checks; j <= checks; j++) {
                const key = `${baseX + i},${baseY + j}`;
                if (this.grid.has(key)) results.push(...this.grid.get(key));
            }
        }
        return results;
    }
}

// ================= 2. 实体类设计 (OOP) =================

class Entity {
    constructor(char, x, y) {
        this.id = Math.random().toString(36).substr(2, 9);
        this.char = char; this.x = x; this.y = y; this.el = null;
    }
    render() {
        if (!this.el) {
            this.el = document.createElement('div');
            this.el.className = 'unit';
            document.getElementById('map-container').appendChild(this.el);
        }
        this.el.style.left = this.x + '%';
        this.el.style.top = this.y + '%';
        this.el.innerText = this.char;
    }
    destroy() { if (this.el) this.el.remove(); }
}

class Enemy extends Entity {
    constructor(char, x, y, hp, speed, path) {
        super(char, x, y); this.hp = hp; this.maxHp = hp; this.speed = speed;
        this.path = path; this.pathIndex = 0; this.stunTimer = 0; this.bounty = 10;
        this.el = null; this.hpFillEl = null;
    }
    update(dt) {
        if (this.stunTimer > 0) {
            this.stunTimer -= dt;
            this.el.classList.add('stunned');
            return;
        } this.el.classList.remove('stunned');

        if (this.pathIndex < this.path.length - 1) {
            const target = this.path[this.pathIndex + 1];
            const dx = target.x - this.x, dy = target.y - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < this.speed * 2) { this.pathIndex++; }
            else { this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed; }
        } else {
            EventBus.emit('enemy_reach_castle', { enemy: this });
            this.hp = 0; 
        }
    }
    takeDamage(dmg) {
        this.hp -= dmg;
        if (this.hpFillEl) this.hpFillEl.style.width = Math.max(0, (this.hp / this.maxHp * 100)) + '%';
        if (this.hp <= 0) EventBus.emit('enemy_die', { enemy: this });
    }
    render() {
        super.render();
        this.el.classList.add('unit-enemy');
        if (!this.hpFillEl) {
            const hpBar = document.createElement('div'); hpBar.className = 'hp-bar';
            this.hpFillEl = document.createElement('div'); this.hpFillEl.className = 'hp-fill';
            hpBar.appendChild(this.hpFillEl); this.el.appendChild(hpBar);
        }
    }
}

class Unit extends Entity {
    constructor(char, type, x, y, stats) {
        super(char, x, y); this.type = type; this.dmg = stats.dmg || 0;
        this.range = stats.range || 0; this.atkSpeed = stats.atkSpeed || 9999;
        this.cd = 0; this.stats = stats; this.target = null;
    }
    update(dt, grid) {
        if (this.dmg === 0) return; // 姓氏名字不攻击
        this.cd -= dt;
        if (this.cd <= 0) {
            // 空间网格索敌
            const nearbyEnemies = grid.queryNearby(this.x, this.y, this.range).filter(e => e instanceof Enemy);
            if (nearbyEnemies.length > 0) {
                this.attack(nearbyEnemies);
                this.cd = this.atkSpeed;
            }
        }
    }
    attack(enemies) {
        // 基础攻击逻辑，由子类或特殊兵种覆盖
        const target = enemies[0]; // 默认打最近
        target.takeDamage(this.dmg);
        this.playAtkAnim();
    }
    playAtkAnim() {
        this.el.style.transform = 'translate(-50%, -50%) scale(1.3)';
        setTimeout(() => { if(this.el) this.el.style.transform = 'translate(-50%, -50%) scale(1)'; }, 100);
    }
    render() {
        super.render();
        this.el.className = `unit unit-${this.type}`;
    }
}

// ================= 3. 特殊兵种与武将 (多态) =================

class BowUnit extends Unit { attack(enemies) { enemies[0].takeDamage(this.dmg); super.playAtkAnim(); } } // 弓：单体
class BladeUnit extends Unit { attack(enemies) { enemies.forEach(e => e.takeDamage(this.dmg)); super.playAtkAnim(); } } // 刀：AOE
class SpearUnit extends Unit { // 枪：穿透(打最近的2个)
    attack(enemies) {
        enemies.slice(0, 2).forEach(e => e.takeDamage(this.dmg));
        super.playAtkAnim();
    }
}

class HeroUnit extends Unit {
    constructor(char, x, y, stats) { super(char, 'hero', x, y, stats); this.skillCd = 5000; }
    update(dt, grid) {
        super.update(dt, grid);
        // 武将主动技能逻辑占位（此处可触发关羽横扫等）
    }
    attack(enemies) {
        // 张飞：震击眩晕
        if (this.char === '张飞') {
            enemies.forEach(e => { e.takeDamage(this.dmg); e.stunTimer = 1500; });
        } else {
            enemies[0].takeDamage(this.dmg);
        }
        super.playAtkAnim();
    }
}

// ================= 4. 游戏管理器 =================

const Game = {
    state: { gold: 50, castleHp: 100, shovels: 0, mapLevel: 1, wave: 0, recruitCost: 20, isWaveActive: false },
    units: [], enemies: [], grid: new SpatialGrid(),
    mapData: null, selectedEntity: null, isGameOver: false, lastTime: 0,
    
    MAPS: [
        { name: "黄巾", path: [{x: 0, y: 30}, {x: 70, y: 30}, {x: 70, y: 70}, {x: 0, y: 70}] },
        { name: "虎牢", path: [{x: 0, y: 20}, {x: 40, y: 20}, {x: 40, y: 80}, {x: 100, y: 80}] }
    ],
    UPGRADE_TREE: { '弓': '弩', '弩': '射', '射': '神射', '刀': '剑', '剑': '斩', '斩': '绝斩', '枪': '矛', '矛': '刺', '刺': '贯', '骑': '驱', '驱': '驰', '驰': '铁骑' },
    UNIT_STATS: {
        '弓': {dmg:10, range:30, atkSpeed:1000, class: BowUnit}, '弩': {dmg:25, range:32, atkSpeed:900, class: BowUnit}, '射': {dmg:60, range:35, atkSpeed:800, class: BowUnit}, '神射': {dmg:150, range:40, atkSpeed:700, class: BowUnit},
        '刀': {dmg:8, range:15, atkSpeed:800, class: BladeUnit}, '剑': {dmg:20, range:16, atkSpeed:750, class: BladeUnit}, '斩': {dmg:45, range:18, atkSpeed:700, class: BladeUnit}, '绝斩': {dmg:100, range:20, atkSpeed:600, class: BladeUnit},
        '枪': {dmg:15, range:20, atkSpeed:1200, class: SpearUnit}, '矛': {dmg:35, range:22, atkSpeed:1100, class: SpearUnit}, '刺': {dmg:80, range:24, atkSpeed:1000, class: SpearUnit}, '贯': {dmg:160, range:26, atkSpeed:900, class: SpearUnit},
        '骑': {dmg:20, range:15, atkSpeed:600, class: Unit}, '驱': {dmg:45, range:16, atkSpeed:500, class: Unit}, '驰': {dmg:90, range:18, atkSpeed:400, class: Unit}, '铁骑': {dmg:200, range:20, atkSpeed:300, class: Unit}
    },
    HERO_DB: {
        '关羽': { skill: '横扫', dmg: 60, range: 35, atkSpeed: 1200 },
        '张飞': { skill: '震击', dmg: 40, range: 25, atkSpeed: 1000 },
        '赵云': { skill: '连击', dmg: 30, range: 30, atkSpeed: 400 },
        '诸葛亮':{ skill: '八阵', dmg: 10, range: 50, atkSpeed: 1500 }
    },

    init() {
        // 绑定事件
        EventBus.on('enemy_die', (data) => this.onEnemyDie(data.enemy));
        EventBus.on('enemy_reach_castle', (data) => this.onEnemyReachCastle(data.enemy));
        
        document.getElementById('recruit-btn').addEventListener('click', () => this.recruit());
        document.getElementById('next-wave-btn').addEventListener('click', () => this.startWave());
        document.getElementById('open-map-btn').addEventListener('click', () => this.openNewMap());
        document.getElementById('restart-btn').addEventListener('click', () => location.reload());
        
        this.initRecruitSlots();
        this.drawMap();
        this.updateUI();
        this.gameLoop(0);
    },

    // --- 核心循环 ---
    gameLoop(timestamp) {
        if (this.isGameOver) return;
        const dt = timestamp - this.lastTime;
        this.lastTime = timestamp;

        // 1. 重建空间网格
        this.grid.clear();
        this.enemies.forEach(e => this.grid.insert(e));

        // 2. 更新逻辑
        this.enemies.forEach(e => e.update(dt));
        this.units.forEach(u => u.update(dt, this.grid));

        // 3. 清理死亡实体
        this.enemies = this.enemies.filter(e => {
            if (e.hp <= 0) { e.destroy(); return false; }
            return true;
        });

        // 4. 渲染
        this.enemies.forEach(e => e.render());
        this.units.forEach(u => u.render());

        requestAnimationFrame((t) => this.gameLoop(t));
    },

    // --- 招募与经济 ---
    recruit() {
        if (this.state.gold < this.state.recruitCost) return this.log("金币不足！");
        this.state.gold -= this.state.recruitCost;
        this.state.recruitCost += 2; // 每次招募+2金币
        this.updateUI();

        const TYPES = { BASIC: ['弓', '刀', '枪', '骑'], SURNAME: ['关', '张', '赵', '马', '黄', '吕', '诸'], NAME: ['羽', '飞', '云', '超', '忠', '布', '亮'] };
        
        document.querySelectorAll('.slot').forEach(s => { s.innerHTML = ''; s.classList.add('empty'); s.onclick = null; });

        for (let i = 0; i < 6; i++) {
            const rand = Math.random();
            let char, type;
            if (rand < 0.60) { char = TYPES.BASIC[Math.floor(Math.random() * 4)]; type = 'basic'; }
            else if (rand < 0.80) { char = TYPES.SURNAME[Math.floor(Math.random() * 7)]; type = 'surname'; }
            else if (rand < 0.95) { char = TYPES.NAME[Math.floor(Math.random() * 7)]; type = 'name'; }
            else { char = '铲'; type = 'shovel'; }
            this.createSlotChar(i, char, type);
        }
    },

    // --- 波次系统 ---
    startWave() {
        if (this.state.isWaveActive) return;
        this.state.isWaveActive = true;
        this.state.wave++;
        this.updateUI();
        
        const count = 5 + this.state.wave * 2;
        let spawned = 0;
        const spawnInterval = setInterval(() => {
            if (spawned >= count) {
                clearInterval(spawnInterval);
                // 波次结束检测
                const checkEnd = setInterval(() => {
                    if (this.enemies.length === 0) {
                        clearInterval(checkEnd);
                        this.endWave();
                    }
                }, 1000);
                return;
            }
            this.spawnEnemy();
            spawned++;
        }, 1500);
    },
    
    endWave() {
        this.state.isWaveActive = false;
        this.state.gold += 20; // 波次奖励
        this.state.recruitCost = 20; // 重置招募费
        this.log(`第 ${this.state.wave} 波清理完毕！获得 20 金币奖励。`);
        this.updateUI();
    },

    spawnEnemy() {
        const path = this.mapData.path;
        const isZhu = Math.random() < 0.2 + (this.state.wave * 0.02);
        const hp = (isZhu ? 100 : 50) * Math.pow(1.2, this.state.wave - 1);
        const speed = isZhu ? 0.3 : 0.6;
        const char = isZhu ? '卒' : '兵';
        const enemy = new Enemy(char, path[0].x, path[0].y, hp, speed, path);
        enemy.bounty = isZhu ? 15 : 10;
        this.enemies.push(enemy);
    },

    // --- 事件回调 ---
    onEnemyDie(enemy) {
        this.state.gold += enemy.bounty;
        this.log(`击杀${enemy.char}，获得 ${enemy.bounty} 金币！`);
        this.updateUI();
    },
    onEnemyReachCastle(enemy) {
        this.state.castleHp -= 10;
        this.log(`主城被攻击！扣除 10 血量。`);
        if (this.state.castleHp <= 0) this.gameOver();
        this.updateUI();
    },

    // --- 部署与合成 ---
    deployUnit(char, type, x, y) {
        let unit;
        if (type === 'hero') {
            unit = new HeroUnit(char, x, y, this.HERO_DB[char]);
        } else if (this.UNIT_STATS[char]) {
            const stats = this.UNIT_STATS[char];
            // 根据数据配置实例化对应类
            unit = new stats.class(char, 'basic', x, y, stats);
        } else {
            unit = new Unit(char, type, x, y, {dmg:0, range:0, atkSpeed:9999}); // 姓名字
        }
        unit.render();
        this.units.push(unit);
    },

    tryCombine(u1, u2) {
        const char1 = u1.char, char2 = u2.char;
        const combinedStr = char1 + char2;
        const reverseStr = char2 + char1;
        
        if (this.HERO_DB[combinedStr] || this.HERO_DB[reverseStr]) {
            const heroName = this.HERO_DB[combinedStr] ? combinedStr : reverseStr;
            this.log(`✨ ${heroName} 降临战场！`, true);
            u1.destroy(); this.units = this.units.filter(u => u.id !== u1.id);
            u2.destroy(); this.units = this.units.filter(u => u.id !== u2.id);
            this.deployUnit(heroName, 'hero', u2.x, u2.y);
            return true;
        }
        if (char1 === char2 && this.UPGRADE_TREE[char1]) {
            const newChar = this.UPGRADE_TREE[char1];
            this.log(`${char1} 升级为 ${newChar}！`);
            u1.destroy(); this.units = this.units.filter(u => u.id !== u1.id);
            u2.destroy(); this.units = this.units.filter(u => u.id !== u2.id);
            this.deployUnit(newChar, 'basic', u2.x, u2.y);
            return true;
        }
        this.log("无法组成武将或升阶！");
        return false;
    },

    // --- UI 与交互 (略缩，与v1类似) ---
    drawMap() { /* 代码同 v1.2，为节省篇幅省略 */ 
        const c = document.getElementById('map-container');
        Array.from(c.children).forEach(child => { if (child.id !== 'game-over') child.remove(); });
        this.mapData = this.MAPS[(this.state.mapLevel - 1) % this.MAPS.length];
        const path = this.mapData.path;
        path.forEach((p, i) => { if (i < path.length - 1) { const p2 = path[i+1]; const line = document.createElement('div'); line.className = 'path-cell'; line.style.left = p.x + '%'; line.style.top = p.y + '%'; if (p.x === p2.x) { line.style.width = '10px'; line.style.height = Math.abs(p2.y - p.y) + '%'; } else { line.style.height = '10px'; line.style.width = Math.abs(p2.x - p.x) + '%'; } c.appendChild(line); } });
        for(let y=15; y<=85; y+=14) { for(let x=10; x<=90; x+=14) { let isPath=false; for(let i=0;i<path.length-1;i++){const p1=path[i],p2=path[i+1];if(p1.y===p2.y&&Math.abs(y-p1.y)<10&&x>=Math.min(p1.x,p2.x)-5&&x<=Math.max(p1.x,p2.x)+5)isPath=true;if(p1.x===p2.x&&Math.abs(x-p1.x)<10&&y>=Math.min(p1.y,p2.y)-5&&y<=Math.max(p1.y,p2.y)+5)isPath=true;} if(!isPath){const div=document.createElement('div');div.className='grid-cell';div.style.left=x+'%';div.style.top=y+'%';div.addEventListener('click',()=>this.handleMapClick(x,y,div));c.appendChild(div);}} }
        const endP = path[path.length-1]; const endDiv = document.createElement('div'); endDiv.style.cssText = `position:absolute;left:${endP.x}%;top:${endP.y}%;width:14%;height:14%;background:#c0392b;display:flex;align-items:center;justify-content:center;border-radius:4px;transform:translate(-50%,-50%);z-index:5;font-weight:bold;`; endDiv.innerText='城'; c.appendChild(endDiv);
    },
    initRecruitSlots() { const area = document.getElementById('recruit-area'); for(let i=0; i<6; i++) { const s = document.createElement('div'); s.className = 'slot empty'; s.dataset.index = i; area.appendChild(s); } },
    createSlotChar(i, char, type) { /* 代码同 v1.2 */ 
        const slot = document.querySelector(`.slot[data-index="${i}"]`); slot.classList.remove('empty'); const el = document.createElement('div'); el.className = `unit unit-${type}`; el.style.position = 'relative'; el.style.transform = 'none'; el.style.width = '100%'; el.style.height = '100%'; el.innerText = char; if (char === '铲') { el.addEventListener('click', (e) => { e.stopPropagation(); this.state.shovels++; slot.innerHTML = ''; slot.classList.add('empty'); this.log("获得一把铲子！"); this.updateUI(); }); } else { el.addEventListener('click', (e) => { e.stopPropagation(); this.selectEntity('slot', el, { char, type, index: i }); }); } slot.appendChild(el);
    },
    selectEntity(srcType, el, data) { this.deselectEntity(); if(this.selectedEntity && this.selectedEntity.el === el) return this.deselectEntity(); this.selectedEntity = { srcType, el, data }; el.classList.add('selected'); },
    deselectEntity() { if (this.selectedEntity && this.selectedEntity.el) this.selectedEntity.el.classList.remove('selected'); this.selectedEntity = null; },
    handleMapClick(x, y, cellEl) { if(!this.selectedEntity) return; if(this.selectedEntity.srcType === 'slot') { this.deployUnit(this.selectedEntity.data.char, this.selectedEntity.data.type, x, y); const slot = document.querySelector(`.slot[data-index="${this.selectedEntity.data.index}"]`); slot.innerHTML=''; slot.classList.add('empty'); this.deselectEntity(); } },
    handleUnitClick(unit) { if(this.selectedEntity && this.selectedEntity.srcType === 'map') { if(this.tryCombine(this.selectedEntity.data, unit)) { this.deselectEntity(); } else { this.deselectEntity(); } } else { this.selectEntity('map', unit.el, unit); } },
    log(msg, isHero=false) { const t = document.getElementById('info-ticker'); t.innerText = msg; t.style.color = isHero ? '#f1c40f' : '#aaa'; },
    updateUI() { document.getElementById('gold').innerText = this.state.gold; document.getElementById('castle-hp').innerText = Math.max(0, this.state.castleHp); document.getElementById('wave-num').innerText = this.state.wave; document.getElementById('shovel-count').innerText = this.state.shovels; document.getElementById('recruit-btn').innerText = `招募 (${this.state.recruitCost}金)`; const ob = document.getElementById('open-map-btn'); ob.disabled = this.state.shovels < 3; },
    openNewMap() { this.state.shovels = 0; this.state.mapLevel++; this.state.castleHp = 100; this.units.forEach(u => u.destroy()); this.units = []; this.enemies.forEach(e => e.destroy()); this.enemies = []; this.drawMap(); this.updateUI(); this.log("开辟新图！"); },
    gameOver() { this.isGameOver = true; document.getElementById('game-over').style.display = 'flex'; }
};

// 重写点击监听，适配 OOP 结构
document.getElementById('map-container').addEventListener('click', (e) => {
    if (Game.isGameOver) return;
    const target = e.target;
    // 如果点击的是单位
    if (target.classList.contains('unit') && !target.classList.contains('unit-enemy')) {
        const unit = Game.units.find(u => u.el === target);
        if (unit) Game.handleUnitClick(unit);
    } else if (target.classList.contains('grid-cell')) {
        if (Game.selectedEntity && Game.selectedEntity.srcType === 'map') Game.deselectEntity();
    }
});

Game.init();
</script>
